services:
  - type: web
    name: narranomics-macro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DASH_USERNAME
        sync: false
      - key: DASH_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
